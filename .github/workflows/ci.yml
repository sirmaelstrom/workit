name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege by default; jobs opt into more if they ever need it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # No dependencies to install — the plugin uses only node: built-ins.
      - name: Run test suite
        run: node --test

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the scan covers every commit
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.0
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan full history
        run: gitleaks git --no-banner --redact --config .gitleaks.toml
