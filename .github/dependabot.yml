version: 2
updates:
  # The plugin has no runtime dependencies (node: built-ins only), so there is
  # no npm manifest to track. Keep the GitHub Actions used in CI patched and,
  # over time, pinned.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
